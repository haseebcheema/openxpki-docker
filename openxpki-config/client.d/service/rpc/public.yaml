global:
    realm: rootca

locale:
    language: en_US

auth:
    stack: _System

input:
    allow_raw_post: 1
    parse_depth: 5

output:
    use_http_status_codes: 1

openapi:
    title: Public Certificate API

SearchCertificate:
    workflow: certificate_search
    input:
      - common_name
    output:
      - cert_identifier
      - notbefore
      - notafter
      - status
      - certificate